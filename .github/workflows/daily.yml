name: 申万菱信债基每日收蛋

on:
  schedule:
    # 北京时间每天 20:00（UTC 12:00）
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本（含内置重试逻辑）
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python swsmu_debt_daily.py --with-retry

      - name: 提交 egg-data.json 更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add egg-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 更新收蛋数据 $(date +%Y-%m-%d)"
            git push
          fi
