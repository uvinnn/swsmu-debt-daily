name: 申万菱信债基每日收蛋文案

on:
  schedule:
    # 北京时间每天 20:00（UTC 12:00）
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行脚本（含重试逻辑）
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          MAX_RETRIES=6
          RETRY_INTERVAL=300

          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== 第 $i 次尝试 $(date '+%Y-%m-%d %H:%M:%S') ==="
            python swsmu_debt_daily.py
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ 成功生成并推送文案"
              exit 0
            elif [ $EXIT_CODE -eq 2 ]; then
              echo "⏳ 净值数据尚未更新，等待 ${RETRY_INTERVAL}秒后重试..."
              if [ $i -lt $MAX_RETRIES ]; then
                sleep $RETRY_INTERVAL
              fi
            else
              echo "❌ 脚本异常退出 (exit code: $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          done

          echo "⚠️ 到20:30仍未获取到今日数据"
          python -c "
          import requests, json, time, hmac, hashlib, base64, urllib.parse, os
          webhook = os.environ['DINGTALK_WEBHOOK']
          secret = os.environ['DINGTALK_SECRET']
          timestamp = str(round(time.time() * 1000))
          sign = urllib.parse.quote_plus(base64.b64encode(hmac.new(secret.encode(), f'{timestamp}\n{secret}'.encode(), hashlib.sha256).digest()))
          url = f'{webhook}&timestamp={timestamp}&sign={sign}'
          requests.post(url, json={'msgtype':'text','text':{'content':'⚠️ 今晚净值数据延迟更新，截至20:30尚未获取到今日数据，请手动检查。'}})
          "
