name: 申万菱信债基每日收蛋

on:
  schedule:
    # 北京时间每天 20:00（UTC 12:00）
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]
    paths:
      - 'egg-tracker.html'
      - 'egg-data.json'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行脚本（含重试逻辑）
        id: run_script
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          MAX_RETRIES=6
          RETRY_INTERVAL=300

          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== 第 $i 次尝试 $(date '+%Y-%m-%d %H:%M:%S') ==="
            python swsmu_debt_daily.py
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ 成功生成文案并更新 egg-data.json"
              echo "DATA_READY=true" >> $GITHUB_OUTPUT
              break
            elif [ $EXIT_CODE -eq 2 ]; then
              echo "⏳ 净值数据尚未更新，等待 ${RETRY_INTERVAL}秒后重试..."
              if [ $i -lt $MAX_RETRIES ]; then
                sleep $RETRY_INTERVAL
              fi
            else
              echo "❌ 脚本异常退出 (exit code: $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          done

          if [ "$DATA_READY" != "true" ]; then
            echo "⚠️ 到20:30仍未获取到今日数据"
            python -c "
import requests, time, hmac, hashlib, base64, urllib.parse, os
webhook = os.environ['DINGTALK_WEBHOOK']
secret = os.environ['DINGTALK_SECRET']
timestamp = str(round(time.time() * 1000))
sign = urllib.parse.quote_plus(base64.b64encode(hmac.new(secret.encode(), f'{timestamp}\n{secret}'.encode(), hashlib.sha256).digest()))
url = f'{webhook}&timestamp={timestamp}&sign={sign}'
requests.post(url, json={'msgtype':'text','text':{'content':'⚠️ 今晚净值数据延迟更新，截至20:30尚未获取到今日数据，请手动检查。'}})
"
          fi

      - name: 提交 egg-data.json 更新
        if: steps.run_script.outputs.DATA_READY == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add egg-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 更新收蛋数据 $(date +%Y-%m-%d)"
            git push
          fi

      - name: 部署 GitHub Pages
        if: steps.run_script.outputs.DATA_READY == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          enable_jekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '📊 更新收蛋数据 ${{ github.event.head_commit.message }}'
